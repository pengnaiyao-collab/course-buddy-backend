# Application Production Configuration

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/db_name
    username: db_user
    password: db_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: redis
    port: 6379

logging:
  level:
    root: INFO
    com.example: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} ${PID} - %msg%n'

# Additional configurations go here