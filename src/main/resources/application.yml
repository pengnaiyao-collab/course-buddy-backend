spring:
  application:
    name: course-buddy-backend
  profiles:
    active: dev
  # MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.coursebuddy.domain.po,com.coursebuddy.domain.auth
  type-enums-package: com.coursebuddy.domain.auth
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    db-config:
      id-type: auto
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080
  servlet:
    context-path: /api
  error:
    # 禁用 Spring Boot 默认的错误视图，防止 Tomcat 在响应已提交时尝试处理错误
    include-message: on_param
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never
    whitelabel:
      enabled: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: ${MINIO_BUCKET:course-buddy}
  maxFileSize: 1073741824  # 1 GB（字节）
  chunkSize: 5242880       # 5 MB（字节）

jwt:
  # 重要：生产环境请通过 JWT_SECRET 覆盖为强随机密钥（至少 32 位）
  secret: ${JWT_SECRET:}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800}
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ============================================================
# 笔记模块配置
# ============================================================
note:
  export:
    # PDF 导出配置
    pdf:
      # PDF 页边距（点，1 点 ≈ 0.352 mm），默认 50
      margin: 50
      # 正文字号，默认 11
      body-font-size: 11
      # 标题字号，默认 16
      title-font-size: 16
  # 版本历史：保留的最大版本数（0 = 不限制）；
  # 如需自动清理旧版本，请将此值设置为大于 0 的整数
  version:
    max-keep: ${NOTE_VERSION_MAX_KEEP:0}
  # 分享链接默认有效期（秒），0 表示永不过期
  share:
    default-ttl-seconds: ${NOTE_SHARE_DEFAULT_TTL:0}

# AI 配置
ai:
  enabled: true
  provider: "aliyun-bailian"
  baseUrl: "${AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}"
  apiKey: "${AI_API_KEY:}"
  model: "${AI_MODEL:qwen-vl-plus}"
  systemPrompt: "你是课伴的 AI 学习助教，请优先给出准确、结构化、适合教学场景的回答。"
  maxTokens: 2048
  temperature: 0.7
  topP: 0.8
  timeout: 120000
  retryCount: 3
  rateLimitPerMinute: 60
  cacheTtl: 3600
  enableCache: true
  enableMonitoring: true
  enableErrorLogging: true
  logRequests: false
  logResponses: false
  maxContextMessages: 20
  maxSourceItems: 3

