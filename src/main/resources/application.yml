spring:
  application:
    name: course-buddy-backend
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080
  servlet:
    context-path: /api

# MinIO configuration
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: ${MINIO_BUCKET:course-buddy}
  maxFileSize: 1073741824  # 1 GB in bytes
  chunkSize: 5242880       # 5 MB in bytes

jwt:
  # IMPORTANT: Override JWT_SECRET environment variable in production with a strong random secret (min 32 chars)
  secret: ${JWT_SECRET:course-buddy-super-secret-key-for-jwt-token-signing-at-least-256-bits}
  expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ============================================================
# 笔记模块配置
# ============================================================
note:
  export:
    # PDF 导出配置
    pdf:
      # PDF 页边距（点，1 点 ≈ 0.352 mm），默认 50
      margin: 50
      # 正文字号，默认 11
      body-font-size: 11
      # 标题字号，默认 16
      title-font-size: 16
    # Markdown 导出配置
    markdown:
      # Markdown 文件编码，默认 UTF-8
      charset: UTF-8
  # 版本历史：保留的最大版本数（0 = 不限制）；
  # 如需自动清理旧版本，请将此值设置为大于 0 的整数
  version:
    max-keep: ${NOTE_VERSION_MAX_KEEP:0}
  # 分享链接默认有效期（秒），0 表示永不过期
  share:
    default-ttl-seconds: ${NOTE_SHARE_DEFAULT_TTL:0}

# 讯飞星火配置
xunfei:
  enabled: true
  appId: "${XUNFEI_APP_ID:}"
  apiKey: "${XUNFEI_API_KEY:}"
  apiSecret: "${XUNFEI_API_SECRET:}"
  endpoint: "wss://spark-api.xf-yun.com/v3.5/chat"
  model: "generalv3.5"
  maxTokens: 2048
  temperature: 0.7
  topK: 4
  timeout: 30000
  retryCount: 3
  rateLimitPerMinute: 60
  cacheTtl: 3600
  enableCache: true
  enableMonitoring: true
  enableErrorLogging: true
